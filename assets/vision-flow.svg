<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 440" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .node-label { font-size: 12px; font-weight: 600; fill: #e6edf3; }
    .node-sub { font-size: 10px; fill: #8b949e; }
    .decision { font-size: 11px; font-weight: 500; fill: #e6edf3; }
    .edge-yes { font-size: 10px; font-weight: 600; fill: #7ee787; }
    .edge-no { font-size: 10px; font-weight: 600; fill: #f85149; }
    .code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; fill: #79c0ff; }
    .annotation { font-size: 10px; fill: #8b949e; }
  </style>

  <!-- Background -->
  <rect width="740" height="440" rx="12" fill="#0d1117"/>

  <!-- ============ Step 1: Entry ============ -->
  <rect x="250" y="24" width="240" height="46" rx="23" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="370" y="44" class="node-label" text-anchor="middle">Model calls Read tool</text>
  <text x="370" y="60" class="node-sub" text-anchor="middle">with image file path</text>

  <line x1="370" y1="70" x2="370" y2="104" stroke="#30363d" stroke-width="1.5" marker-end="url(#f-arr)"/>

  <!-- ============ Decision 1: Anthropic? ============ -->
  <polygon points="370,104 520,148 370,192 220,148" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="370" y="142" class="decision" text-anchor="middle">ANTHROPIC_BASE_URL</text>
  <text x="370" y="158" class="decision" text-anchor="middle">is Anthropic?</text>

  <!-- Yes -> ALLOW (right) -->
  <line x1="520" y1="148" x2="610" y2="148" stroke="#238636" stroke-width="1.5" marker-end="url(#f-arr-g)"/>
  <text x="556" y="140" class="edge-yes">Yes</text>

  <rect x="610" y="126" width="106" height="46" rx="8" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="1.5"/>
  <text x="663" y="146" class="node-label" text-anchor="middle" fill="#7ee787">ALLOW</text>
  <text x="663" y="162" class="node-sub" text-anchor="middle">Opus has vision</text>

  <!-- No -> down -->
  <line x1="370" y1="192" x2="370" y2="230" stroke="#30363d" stroke-width="1.5" marker-end="url(#f-arr)"/>
  <text x="382" y="214" class="edge-no">No</text>

  <!-- ============ Decision 2: Image extension? ============ -->
  <polygon points="370,230 510,270 370,310 230,270" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="370" y="264" class="decision" text-anchor="middle">File extension is</text>
  <text x="370" y="280" class="decision" text-anchor="middle">png/jpg/gif/webp/bmp?</text>

  <!-- No -> ALLOW (right) -->
  <line x1="510" y1="270" x2="610" y2="270" stroke="#238636" stroke-width="1.5" marker-end="url(#f-arr-g)"/>
  <text x="550" y="262" class="edge-yes">No</text>

  <rect x="610" y="248" width="106" height="46" rx="8" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="1.5"/>
  <text x="663" y="268" class="node-label" text-anchor="middle" fill="#7ee787">ALLOW</text>
  <text x="663" y="284" class="node-sub" text-anchor="middle">not an image</text>

  <!-- Yes -> BLOCK (down) -->
  <line x1="370" y1="310" x2="370" y2="344" stroke="#30363d" stroke-width="1.5" marker-end="url(#f-arr)"/>
  <text x="382" y="332" class="edge-no">Yes</text>

  <!-- ============ BLOCK ============ -->
  <rect x="284" y="344" width="172" height="40" rx="8" fill="#da3633" fill-opacity="0.2" stroke="#da3633" stroke-width="1.5"/>
  <text x="370" y="362" class="node-label" text-anchor="middle" fill="#f85149">BLOCK</text>
  <text x="370" y="376" class="node-sub" text-anchor="middle">exit 2 + guidance msg</text>

  <!-- BLOCK -> MCP redirect -->
  <line x1="456" y1="364" x2="510" y2="364" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#f-arr-p)"/>

  <rect x="510" y="348" width="206" height="34" rx="6" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
  <text x="613" y="363" class="code" text-anchor="middle">mcp__vision__see_image</text>
  <text x="613" y="376" class="node-sub" text-anchor="middle">returns text description</text>

  <!-- ============ Left annotation ============ -->
  <rect x="24" y="118" width="164" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="106" y="140" class="node-label" text-anchor="middle">vision-guard.sh</text>
  <text x="106" y="156" class="annotation" text-anchor="middle">PreToolUse hook</text>
  <text x="106" y="170" class="annotation" text-anchor="middle">deterministic</text>

  <!-- Connector: annotation -> decision 1 -->
  <line x1="188" y1="148" x2="220" y2="148" stroke="#30363d" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="f-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#30363d"/>
    </marker>
    <marker id="f-arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#238636"/>
    </marker>
    <marker id="f-arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>
