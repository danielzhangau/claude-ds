<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .node-label { font-size: 12px; font-weight: 600; fill: #e6edf3; }
    .node-sub { font-size: 10px; fill: #8b949e; }
    .decision { font-size: 11px; font-weight: 500; fill: #e6edf3; }
    .edge { font-size: 10px; font-weight: 600; }
    .yes { fill: #7ee787; }
    .no { fill: #f85149; }
    .code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; fill: #79c0ff; }
  </style>

  <!-- Background -->
  <rect width="720" height="400" rx="12" fill="#0d1117"/>

  <!-- Step 1: Model calls Read -->
  <rect x="240" y="20" width="240" height="44" rx="22" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="360" y="40" class="node-label" text-anchor="middle">Model calls Read tool</text>
  <text x="360" y="54" class="node-sub" text-anchor="middle">with image file path</text>

  <!-- Arrow down -->
  <line x1="360" y1="64" x2="360" y2="94" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision 1: Anthropic? -->
  <polygon points="360,94 500,134 360,174 220,134" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="360" y="130" class="decision" text-anchor="middle">ANTHROPIC_BASE_URL</text>
  <text x="360" y="144" class="decision" text-anchor="middle">is Anthropic?</text>

  <!-- Yes: Allow (native Opus) -->
  <line x1="500" y1="134" x2="600" y2="134" stroke="#238636" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="540" y="126" class="edge yes">Yes</text>
  <rect x="600" y="112" width="100" height="44" rx="8" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="1.5"/>
  <text x="650" y="132" class="node-label" text-anchor="middle" fill="#7ee787">ALLOW</text>
  <text x="650" y="148" class="node-sub" text-anchor="middle">Opus sees images</text>

  <!-- No: check extension -->
  <line x1="360" y1="174" x2="360" y2="204" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="192" class="edge no">No</text>

  <!-- Decision 2: Image extension? -->
  <polygon points="360,204 490,240 360,276 230,240" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="360" y="236" class="decision" text-anchor="middle">Extension is</text>
  <text x="360" y="250" class="decision" text-anchor="middle">png/jpg/gif/...?</text>

  <!-- No: Allow -->
  <line x1="490" y1="240" x2="600" y2="240" stroke="#238636" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="536" y="232" class="edge yes">No</text>
  <rect x="600" y="218" width="100" height="44" rx="8" fill="#238636" fill-opacity="0.15" stroke="#238636" stroke-width="1.5"/>
  <text x="650" y="238" class="node-label" text-anchor="middle" fill="#7ee787">ALLOW</text>
  <text x="650" y="254" class="node-sub" text-anchor="middle">not an image</text>

  <!-- Yes: BLOCK -->
  <line x1="360" y1="276" x2="360" y2="306" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="294" class="edge no">Yes</text>

  <rect x="280" y="306" width="160" height="40" rx="8" fill="#da3633" fill-opacity="0.2" stroke="#da3633" stroke-width="1.5"/>
  <text x="360" y="324" class="node-label" text-anchor="middle" fill="#f85149">BLOCK</text>
  <text x="360" y="338" class="node-sub" text-anchor="middle">exit 2 + guidance</text>

  <!-- Arrow to MCP -->
  <line x1="360" y1="346" x2="360" y2="366" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-p)"/>

  <rect x="225" y="366" width="270" height="24" rx="6" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
  <text x="360" y="383" class="code" text-anchor="middle">mcp__vision__see_image  ->  text description</text>

  <!-- Left annotation -->
  <rect x="20" y="108" width="170" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="105" y="128" class="node-sub" text-anchor="middle">vision-guard.sh</text>
  <text x="105" y="144" class="node-sub" text-anchor="middle">PreToolUse hook</text>
  <text x="105" y="156" class="node-sub" text-anchor="middle">100% enforcement</text>
  <line x1="190" y1="134" x2="220" y2="134" stroke="#30363d" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#30363d"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#238636"/>
    </marker>
    <marker id="arr-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>
