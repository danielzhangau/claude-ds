<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>claude-ds README Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+SC:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0d1117;
        display: flex; justify-content: center; align-items: center;
        min-height: 100vh;
        font-family: "JetBrains Mono", "Noto Sans SC", monospace;
      }
      .banner {
        width: 1280px; height: 640px;
        background: linear-gradient(135deg, #0a0e14 0%, #0d1520 50%, #0a0f18 100%);
        position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
      }
      .grid {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
        background-size: 40px 40px; pointer-events: none;
      }
      .glow-left {
        position: absolute; left: 12%; top: 50%;
        transform: translate(-50%, -50%);
        width: 520px; height: 520px;
        background: radial-gradient(circle, rgba(217,119,87,0.06) 0%, transparent 70%);
        pointer-events: none;
      }
      .glow-right {
        position: absolute; right: 12%; top: 50%;
        transform: translate(50%, -50%);
        width: 520px; height: 520px;
        background: radial-gradient(circle, rgba(77,107,254,0.06) 0%, transparent 70%);
        pointer-events: none;
      }
      .content {
        position: relative; z-index: 2;
        display: flex; align-items: center;
        gap: 52px;
      }
      .tech-block {
        display: flex; flex-direction: column; align-items: center; gap: 18px;
      }
      .logo-card {
        width: 180px; height: 180px;
        border-radius: 34px;
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      .logo-card svg { width: 104px; height: 104px; }
      .logo-card.claude {
        background: linear-gradient(135deg, #d97757, #be5c3a);
        box-shadow: 0 16px 48px rgba(217,119,87,0.2);
      }
      .logo-card.deepseek {
        background: linear-gradient(135deg, #4D6BFE, #3550d8);
        box-shadow: 0 16px 48px rgba(77,107,254,0.2);
      }
      .logo-label {
        font-size: 16px; font-weight: 600;
        letter-spacing: 2px;
        color: rgba(255,255,255,0.5); text-transform: uppercase;
      }
      /* Connector */
      .connector {
        display: flex; flex-direction: column; align-items: center; gap: 8px;
      }
      .connector-line {
        width: 70px; height: 2px;
        background: linear-gradient(90deg, rgba(217,119,87,0.35), rgba(77,107,254,0.35));
        border-radius: 1px;
      }
      .connector-plus {
        font-size: 36px; font-weight: 700;
        color: rgba(255,255,255,0.18);
      }
      /* Project result */
      .project-badge {
        display: flex; flex-direction: column; align-items: center;
        gap: 10px; margin-left: 12px;
      }
      .project-equals {
        font-size: 44px; font-weight: 900;
        color: rgba(255,255,255,0.1); margin-bottom: 4px;
      }
      .project-name {
        font-size: 56px; font-weight: 800;
        color: #f0f6fc; letter-spacing: -2px;
      }
      .project-name .dash { color: #3fb950; }
      .project-tag {
        font-size: 13px; font-weight: 600;
        color: rgba(255,255,255,0.25); letter-spacing: 4px;
        text-transform: uppercase;
        padding: 5px 14px;
        border: 1px solid rgba(255,255,255,0.06); border-radius: 4px;
      }
      .tagline {
        position: absolute; bottom: 46px; left: 50%;
        transform: translateX(-50%); z-index: 2;
        font-size: 16px; color: rgba(255,255,255,0.22);
        letter-spacing: 2.5px;
      }
      .vignette {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.25) 100%);
        pointer-events: none; z-index: 3;
      }
    </style>
  </head>
